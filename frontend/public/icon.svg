<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="NextStep icon">
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#1E3A5F"/>

  <!-- Ascending staircase (3 steps, left → right → up) -->
  <path
    d="M 8,57
       V 45
       H 26
       V 33
       H 44
       V 21
       H 57
       V 57
       Z"
    fill="white"
    opacity="0.92"
  />

  <!-- Blue accent arrow pointing upward above the top step -->
  <polygon
    points="50,21 56,10 44,10"
    fill="#3B82F6"
  />
</svg>
