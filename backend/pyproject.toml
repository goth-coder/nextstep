[tool.ruff]
line-length = 120
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    "*.egg-info",
    "scripts",  # exploratory scripts, not production code
]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --cov=app --cov=ml --cov-report=term-missing --cov-fail-under=80"
pythonpath = ["."]

[tool.coverage.run]
source = ["app", "ml"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
