apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextstep-mlflow
  namespace: nextstep
  labels:
    app: nextstep-mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextstep-mlflow
  template:
    metadata:
      labels:
        app: nextstep-mlflow
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.14.3
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////mlruns/mlflow.db
            - --serve-artifacts
            - --artifacts-destination=/mlruns/artifacts   # physical storage (PVC)
            - --default-artifact-root=mlflow-artifacts:/  # clients download via HTTP proxy
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlruns         # matches local artifact paths baked into mlflow.db
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nextstep-mlflow-service
  namespace: nextstep
  labels:
    app: nextstep-mlflow
spec:
  selector:
    app: nextstep-mlflow
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
