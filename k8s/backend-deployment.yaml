apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextstep-api
  namespace: nextstep
  labels:
    app: nextstep-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextstep-api
  template:
    metadata:
      labels:
        app: nextstep-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Run ETL before the API starts so students_meta.pkl and tensors exist
      initContainers:
        - name: etl
          image: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep/nextstep-api:IMAGE_TAG_PLACEHOLDER
          command: ["sh", "-c", "mkdir -p /app/data/processed && python ml/data_loader.py"]
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: mlflow-tracking-uri
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: processed-data
              mountPath: /app/data/processed
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep/nextstep-api:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # gunicorn writes tmp files
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8080"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nextstep-secrets
                  key: groq-api-key
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: mlflow-tracking-uri
            - name: ALLOWED_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: allowed-origin
          resources:
            requests:
              memory: "512Mi"   # steady-state after startup inference ~400 MB
              cpu: "100m"       # inference runs once at startup; idle after
            limits:
              memory: "1.5Gi"   # startup LSTM batch inference peak ~800 MB
              cpu: "1000m"      # burst during startup + concurrent requests
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: processed-data
              mountPath: /app/data/processed
      volumes:
        - name: processed-data
          emptyDir: {}   # shared between init container (etl) and api container
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextstep-config
  namespace: nextstep
data:
  mlflow-tracking-uri: "http://nextstep-mlflow-service:5000"
  allowed-origin: "https://nextstep-advisor.uk"
