apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextstep-api
  labels:
    app: nextstep-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextstep-api
  template:
    metadata:
      labels:
        app: nextstep-api
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/nextstep-api:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nextstep-secrets
                  key: groq-api-key
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: mlflow-tracking-uri
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextstep-config
data:
  mlflow-tracking-uri: "http://mlflow-service:5000"
