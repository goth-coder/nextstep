apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextstep-api
  namespace: nextstep
  labels:
    app: nextstep-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextstep-api
  template:
    metadata:
      labels:
        app: nextstep-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: gcr.io/nextstep-fiap-project/nextstep-api:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # gunicorn writes tmp files
            capabilities:
              drop: ["ALL"]
          env:
            - name: PORT
              value: "8080"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nextstep-secrets
                  key: groq-api-key
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: mlflow-tracking-uri
            - name: ALLOWED_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: nextstep-config
                  key: allowed-origin
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextstep-config
  namespace: nextstep
data:
  mlflow-tracking-uri: "http://nextstep-mlflow-service:5000"
  allowed-origin: "https://nextstep-advisor.uk"
