apiVersion: batch/v1
kind: Job
metadata:
  name: nextstep-train
  namespace: nextstep
  labels:
    app: nextstep-train
spec:
  ttlSecondsAfterFinished: 3600   # auto-clean job after 1h
  backoffLimit: 0  # quality-gate failures are not transient — no retry
  template:
    metadata:
      labels:
        app: nextstep-train
    spec:
      restartPolicy: Never
      # Training job: no strict security context needed (ephemeral batch pod)
      containers:
        - name: train
          image: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep/nextstep-api:IMAGE_TAG_PLACEHOLDER
          command: ["sh", "-c", "mkdir -p /app/data/processed && python ml/data_loader.py && if [ \"$MODEL_TYPE\" = \"lgbm\" ]; then if [ \"$TRIALS\" -gt 0 ]; then python ml/tune_lgbm.py --trials $TRIALS; else python ml/train_lgbm.py; fi; else if [ \"$TRIALS\" -gt 0 ]; then python ml/tune.py --trials $TRIALS; else python ml/train.py; fi; fi"]
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://nextstep-mlflow-service:5000"
            - name: DATA_PATH
              value: "gs://nextstep-bucket/raw/BASE DE DADOS PEDE 2022-2024 - DATATHON.xlsx"
            - name: GIT_PYTHON_REFRESH
              value: "quiet"
            - name: GCS_BUCKET
              value: "nextstep-bucket"
            - name: TRIALS
              value: "TRIALS_PLACEHOLDER"
            - name: MODEL_TYPE
              value: "MODEL_TYPE_PLACEHOLDER"
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nextstep-secrets
                  key: groq-api-key
          resources:
            requests:
              memory: "1.5Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
          # No PVC mount needed: training uploads artifacts via MLflow HTTP API
          # (MLflow server has --serve-artifacts and writes to its own PVC)
