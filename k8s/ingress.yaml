apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextstep-ingress
  namespace: nextstep
  annotations:
    # cert-manager: use prod issuer (switch to letsencrypt-staging first to test)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # NGINX rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Security headers are set in the nginx ConfigMap (nextstep-nginx-config).
    # configuration-snippet is disabled by default in NGINX Ingress >= 1.9 (CVE-2021-25742).
    # Proxy timeouts for LLM advice endpoint (can be slow)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nextstep-advisor.uk
      secretName: nextstep-tls
  rules:
    - host: nextstep-advisor.uk
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nextstep-api-service
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: nextstep-api-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextstep-web-service
                port:
                  number: 80
