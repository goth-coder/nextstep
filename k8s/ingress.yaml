apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextstep-ingress
  namespace: nextstep
  annotations:
    # cert-manager: use prod issuer (switch to letsencrypt-staging first to test)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # NGINX rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";
    # Proxy timeouts for LLM advice endpoint (can be slow)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nextstep-advisor.uk
      secretName: nextstep-tls
  rules:
    - host: nextstep-advisor.uk
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nextstep-api-service
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: nextstep-api-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextstep-web-service
                port:
                  number: 80
