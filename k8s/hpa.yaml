apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nextstep-api-hpa
  namespace: nextstep
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nextstep-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
