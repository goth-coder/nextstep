name: Train Model

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: "Model architecture to train"
        required: false
        default: "lstm"
        type: choice
        options: ["lstm", "lgbm"]
      promote_to_prod:
        description: "Promote @staging to @prod after training?"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      trials:
        description: "HPO trials (0 = skip HPO, run train directly; max 200)"
        required: false
        default: "0"
        type: string
  workflow_call:
    inputs:
      model_type:
        required: false
        default: "lstm"
        type: string
      promote_to_prod:
        required: false
        default: "true"
        type: string
      trials:
        required: false
        default: "0"
        type: string

env:
  PROJECT_ID: nextstep-fiap-project
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep
  TRAIN_ZONE: us-central1-a
  TRAIN_MACHINE: e2-standard-2
  TRAIN_DISK: "30"

jobs:
  train:
    name: Create Cluster + Run Training
    runs-on: ubuntu-latest
    timeout-minutes: 90  # hard cap: cluster costs money if left running (200 trials can take ~60min)
    outputs:
      model_name: ${{ steps.submit.outputs.model_name }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet
          echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"

      - name: Resolve MLflow URL
        id: mlflow
        run: |
          URL=$(gcloud run services describe nextstep-mlflow \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)' 2>/dev/null || echo "")
          if [[ -z "$URL" ]]; then
            echo "::error::MLflow Cloud Run service not found. Run the Deploy workflow first."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "MLflow URL: $URL"

      - name: Create ephemeral training cluster
        id: cluster
        run: |
          CLUSTER_NAME="nextstep-train-${{ github.run_id }}"
          echo "Creating cluster $CLUSTER_NAME in $TRAIN_ZONE..."
          gcloud container clusters create "$CLUSTER_NAME" \
            --zone "$TRAIN_ZONE" \
            --num-nodes 1 \
            --machine-type "$TRAIN_MACHINE" \
            --disk-type pd-standard \
            --disk-size "$TRAIN_DISK" \
            --project "$PROJECT_ID" \
            --scopes=cloud-platform \
            --no-enable-autoupgrade \
            --quiet
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "cluster_zone=$TRAIN_ZONE" >> "$GITHUB_OUTPUT"
          echo "✅ Cluster $CLUSTER_NAME created"

      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials "${{ steps.cluster.outputs.cluster_name }}" \
            --zone "${{ steps.cluster.outputs.cluster_zone }}" \
            --project "$PROJECT_ID"

      - name: Bootstrap namespace and secrets
        run: |
          kubectl create namespace nextstep --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic nextstep-secrets \
            --namespace=nextstep \
            --from-literal=groq-api-key=${{ secrets.GROQ_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete previous training job (if any)
        run: kubectl delete job nextstep-train -n nextstep 2>/dev/null || true

      - name: Submit training job
        id: submit
        run: |
          TRIALS="${{ inputs.trials }}"
          TRIALS=${TRIALS:-0}
          # Clamp to max 200
          if (( TRIALS > 200 )); then TRIALS=200; fi
          MODEL_TYPE="${{ inputs.model_type }}"
          MODEL_TYPE=${MODEL_TYPE:-lstm}
          MODEL_NAME="nextstep-${MODEL_TYPE}"
          echo "model_name=${MODEL_NAME}" >> "$GITHUB_OUTPUT"
          echo "Trials: $TRIALS  ModelType: $MODEL_TYPE  ModelName: $MODEL_NAME"
          sed "s|IMAGE_TAG_PLACEHOLDER|${{ github.sha }}|g" k8s/train-job.yaml \
            | sed "s|http://nextstep-mlflow-service:5000|${{ steps.mlflow.outputs.url }}|g" \
            | sed "s|TRIALS_PLACEHOLDER|$TRIALS|g" \
            | sed "s|MODEL_TYPE_PLACEHOLDER|$MODEL_TYPE|g" \
            | kubectl apply -f -
          echo "✅ Training job submitted with MODEL_TYPE=$MODEL_TYPE TRIALS=$TRIALS"

      - name: Wait for pod to be scheduled
        run: |
          echo "⏳ Waiting for training pod..."
          kubectl wait pod \
            -l job-name=nextstep-train \
            --for=condition=Ready \
            --namespace=nextstep \
            --timeout=120s || true
          kubectl get pods -n nextstep -l job-name=nextstep-train -o wide || true

      - name: Stream training logs
        run: |
          # Trap: if this step exits with error, delete the cluster immediately
          # (the cleanup job below is the primary safety net, this is a belt-and-suspenders)
          CLUSTER_NAME="${{ steps.cluster.outputs.cluster_name }}"
          CLUSTER_ZONE="${{ steps.cluster.outputs.cluster_zone }}"
          _cleanup() {
            if [[ -n "$CLUSTER_NAME" ]]; then
              echo "🧹 Trap triggered — deleting cluster $CLUSTER_NAME..."
              gcloud container clusters delete "$CLUSTER_NAME" \
                --zone "$CLUSTER_ZONE" --project "$PROJECT_ID" --quiet 2>/dev/null || true
            fi
          }
          trap '_cleanup' ERR

          echo "📡 Streaming training logs (timeout 30min)..."
          kubectl logs -n nextstep \
            -l job-name=nextstep-train \
            --follow --timestamps --prefix 2>/dev/null &
          LOG_PID=$!

          for i in $(seq 1 180); do
            sleep 10
            STATUS=$(kubectl get job nextstep-train -n nextstep \
              -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
            FAILED=$(kubectl get job nextstep-train -n nextstep \
              -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")

            if [[ "$STATUS" == "True" ]]; then
              echo "✅ Training completed (~$((i*10))s elapsed)"
              kill $LOG_PID 2>/dev/null || true
              exit 0
            fi
            if [[ "$FAILED" == "True" ]]; then
              echo "❌ Training job failed (~$((i*10))s elapsed)"
              kill $LOG_PID 2>/dev/null || true
              exit 1
            fi
            if (( i % 5 == 0 )); then
              echo "⏳ Still running... (~$((i*10))s elapsed)"
              kubectl get pods -n nextstep -l job-name=nextstep-train --no-headers 2>/dev/null || true
            fi
          done

          kill $LOG_PID 2>/dev/null || true
          echo "❌ Timeout after 30min"
          exit 1

      - name: Diagnose failure
        if: failure()
        run: |
          echo "=== Job ==="
          kubectl describe job nextstep-train -n nextstep || true
          echo "=== Pod ==="
          kubectl describe pods -n nextstep -l job-name=nextstep-train || true
          echo "=== Events ==="
          kubectl get events -n nextstep --sort-by='.lastTimestamp' | tail -30 || true
          echo "=== Logs (last 100 lines) ==="
          kubectl logs -n nextstep -l job-name=nextstep-train --tail=100 --timestamps 2>/dev/null || true

  promote:
    name: Promote Model in MLflow
    runs-on: ubuntu-latest
    needs: [train]
    if: success()
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get MLflow URL
        id: mlflow
        run: |
          URL=$(gcloud run services describe nextstep-mlflow \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Install mlflow client
        run: pip install --quiet mlflow

      - name: Promote latest version to @staging
        env:
          MLFLOW_URL: ${{ steps.mlflow.outputs.url }}
          MODEL_NAME: ${{ needs.train.outputs.model_name }}
        run: |
          python3 - <<'EOF'
          import mlflow, sys, os
          name = os.environ["MODEL_NAME"]
          client = mlflow.MlflowClient(os.environ["MLFLOW_URL"])
          versions = client.search_model_versions(f"name='{name}'")
          if not versions:
              print(f"No model versions found for '{name}' — training may have failed")
              sys.exit(1)
          latest = max(versions, key=lambda v: int(v.version))
          client.set_registered_model_alias(name, "staging", latest.version)
          print(f"✅ {name} version {latest.version} → @staging")
          EOF

      - name: Promote @staging to @prod
        if: inputs.promote_to_prod == 'true'
        env:
          MLFLOW_URL: ${{ steps.mlflow.outputs.url }}
          MODEL_NAME: ${{ needs.train.outputs.model_name }}
        run: |
          python3 - <<'EOF'
          import mlflow, os
          name = os.environ["MODEL_NAME"]
          client = mlflow.MlflowClient(os.environ["MLFLOW_URL"])
          mv = client.get_model_version_by_alias(name, "staging")
          client.set_registered_model_alias(name, "prod", mv.version)
          print(f"✅ {name} version {mv.version} → @prod")
          EOF

      - name: Restart API to load new model
        if: inputs.promote_to_prod == 'true'
        run: |
          MODEL_NAME="${{ needs.train.outputs.model_name }}"
          gcloud run services update nextstep-api \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --update-env-vars "CACHE_BUST=${{ github.run_id }},MLFLOW_MODEL_NAME=${MODEL_NAME}" \
            --quiet
          echo "✅ API restarted — will load ${MODEL_NAME}@prod on startup"

  cleanup:
    name: Delete Ephemeral Cluster
    runs-on: ubuntu-latest
    needs: [train]
    if: always()  # always run — cluster name is deterministic, no need for outputs
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Delete training cluster
        run: |
          # Cluster name is deterministic: nextstep-train-<run_id>
          # This avoids depending on job outputs which may not be set if job was cancelled
          CLUSTER_NAME="nextstep-train-${{ github.run_id }}"
          echo "🗑️ Deleting $CLUSTER_NAME..."
          gcloud container clusters delete "$CLUSTER_NAME" \
            --zone "$TRAIN_ZONE" \
            --project "$PROJECT_ID" \
            --quiet 2>/dev/null \
            && echo "✅ Cluster deleted — billing stopped" \
            || echo "ℹ️ Cluster $CLUSTER_NAME not found (may not have been created or already deleted)"
