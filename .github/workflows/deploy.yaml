name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options: ["production", "staging"]

env:
  PROJECT_ID: nextstep-fiap-project
  REGION: us-central1
  DOMAIN: nextstep-advisor.uk
  REGISTRY: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep
  CLUSTER_NODES: "1"
  CLUSTER_MACHINE_TYPE: e2-standard-2
  CLUSTER_DISK_TYPE: pd-standard
  CLUSTER_DISK_SIZE: "50"

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # ── GCP auth ──────────────────────────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      # ── Ensure ephemeral cluster exists (auto-create if missing) ───────────
      - name: Ensure GKE cluster exists
        run: |
          CLUSTER_NAME="${{ secrets.GKE_CLUSTER_NAME }}"
          LOCATION="${{ secrets.GKE_CLUSTER_ZONE }}"

          if gcloud container clusters describe "$CLUSTER_NAME" \
            --zone "$LOCATION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            echo "Cluster found in zone: $LOCATION"
            exit 0
          fi

          if gcloud container clusters describe "$CLUSTER_NAME" \
            --region "$LOCATION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            echo "Cluster found in region: $LOCATION"
            exit 0
          fi

          echo "Cluster not found. Creating cluster '$CLUSTER_NAME' in '$LOCATION'..."

          if [[ "$LOCATION" =~ -[a-z]$ ]]; then
            gcloud container clusters create "$CLUSTER_NAME" \
              --zone "$LOCATION" \
              --num-nodes "$CLUSTER_NODES" \
              --machine-type "$CLUSTER_MACHINE_TYPE" \
              --disk-type "$CLUSTER_DISK_TYPE" \
              --disk-size "$CLUSTER_DISK_SIZE" \
              --project "$PROJECT_ID"
          else
            gcloud container clusters create "$CLUSTER_NAME" \
              --region "$LOCATION" \
              --num-nodes "$CLUSTER_NODES" \
              --machine-type "$CLUSTER_MACHINE_TYPE" \
              --disk-type "$CLUSTER_DISK_TYPE" \
              --disk-size "$CLUSTER_DISK_SIZE" \
              --project "$PROJECT_ID"
          fi

          echo "Cluster created successfully."

      # ── Build & push images ───────────────────────────────────────────────
      - name: Build & push backend image
        run: |
          docker build -t $REGISTRY/nextstep-api:${{ github.sha }} ./backend
          docker push $REGISTRY/nextstep-api:${{ github.sha }}
          docker tag $REGISTRY/nextstep-api:${{ github.sha }} $REGISTRY/nextstep-api:latest
          docker push $REGISTRY/nextstep-api:latest

      - name: Build & push frontend image
        run: |
          docker build -t $REGISTRY/nextstep-web:${{ github.sha }} ./frontend
          docker push $REGISTRY/nextstep-web:${{ github.sha }}
          docker tag $REGISTRY/nextstep-web:${{ github.sha }} $REGISTRY/nextstep-web:latest
          docker push $REGISTRY/nextstep-web:latest

      # ── GKE credentials ───────────────────────────────────────────────────
      - name: Resolve GKE location
        id: resolve-gke
        run: |
          CLUSTER_NAME="${{ secrets.GKE_CLUSTER_NAME }}"
          INPUT_LOCATION="${{ secrets.GKE_CLUSTER_ZONE }}"

          if gcloud container clusters describe "$CLUSTER_NAME" \
            --zone "$INPUT_LOCATION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            echo "location=$INPUT_LOCATION" >> "$GITHUB_OUTPUT"
            echo "Resolved GKE location as zone: $INPUT_LOCATION"
            exit 0
          fi

          if gcloud container clusters describe "$CLUSTER_NAME" \
            --region "$INPUT_LOCATION" \
            --project "$PROJECT_ID" >/dev/null 2>&1; then
            echo "location=$INPUT_LOCATION" >> "$GITHUB_OUTPUT"
            echo "Resolved GKE location as region: $INPUT_LOCATION"
            exit 0
          fi

          echo "Cluster not found with provided secrets."
          echo "PROJECT_ID=$PROJECT_ID"
          echo "GKE_CLUSTER_NAME=$CLUSTER_NAME"
          echo "GKE_CLUSTER_ZONE=$INPUT_LOCATION"
          echo "Available clusters in project:"
          gcloud container clusters list --project "$PROJECT_ID" || true
          exit 1

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ steps.resolve-gke.outputs.location }}

      # ── Helm: ingress-nginx + cert-manager (idempotent) ──────────────────
      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx --force-update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            --set controller.replicaCount=1 \
            --wait --timeout=120s

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io --force-update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout=120s

      # ── Bootstrap cluster resources ───────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create / update app secrets
        run: |
          kubectl create secret generic nextstep-secrets \
            --namespace=nextstep \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Apply all manifests with substituted image tags ───────────────────
      - name: Substitute image tags and apply manifests
        run: |
          # train-job.yaml → run via train workflow
          # cluster-issuer.yaml → applied separately after cert-manager is ready
          for f in k8s/*.yaml; do
            [[ "$f" == *train-job* ]]     && continue
            [[ "$f" == *cluster-issuer* ]] && continue
            sed "s|IMAGE_TAG_PLACEHOLDER|${{ github.sha }}|g" "$f" | kubectl apply -f -
          done

      - name: Apply cert-manager ClusterIssuers
        run: kubectl apply -f k8s/cluster-issuer.yaml

      # ── Wait for rollouts ─────────────────────────────────────────────────
      - name: Wait for MLflow rollout
        run: |
          kubectl rollout status deployment/nextstep-mlflow \
            --namespace=nextstep --timeout=120s

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/nextstep-api \
            --namespace=nextstep --timeout=180s

      - name: Wait for web rollout
        run: |
          kubectl rollout status deployment/nextstep-web \
            --namespace=nextstep --timeout=60s

      # ── Smoke tests ───────────────────────────────────────────────────────
      - name: Smoke test — health endpoint
        run: |
          sleep 15
          curl -f --retry 6 --retry-delay 10 --retry-connrefused \
            https://$DOMAIN/health
        continue-on-error: true  # domain/TLS may not be configured yet

      - name: Smoke test — students endpoint (internal)
        run: |
          API_POD=$(kubectl get pods -n nextstep -l app=nextstep-api \
            -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n nextstep $API_POD -c api -- \
            wget -qO- http://localhost:8080/api/students 2>&1 | head -c 200

      # ── Rollback on failure ───────────────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back..."
          kubectl rollout undo deployment/nextstep-api --namespace=nextstep || true
          kubectl rollout undo deployment/nextstep-web --namespace=nextstep || true
