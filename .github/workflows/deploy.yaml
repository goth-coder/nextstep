name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options: ["production", "staging"]

env:
  PROJECT_ID: nextstep-fiap-project
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/nextstep-fiap-project/nextstep
  FRONTEND_DOMAIN: nextstep-advisor.uk

jobs:
  build-mlflow:
    name: Build MLflow Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build & push MLflow image
        run: |
          docker build -t $REGISTRY/nextstep-mlflow:latest ./mlflow
          docker push $REGISTRY/nextstep-mlflow:latest

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build & push backend image
        run: |
          docker build -t $REGISTRY/nextstep-api:${{ github.sha }} ./backend
          docker push $REGISTRY/nextstep-api:${{ github.sha }}
          docker tag $REGISTRY/nextstep-api:${{ github.sha }} $REGISTRY/nextstep-api:latest
          docker push $REGISTRY/nextstep-api:latest

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build & push frontend image
        run: |
          docker build -t $REGISTRY/nextstep-web:${{ github.sha }} ./frontend
          docker push $REGISTRY/nextstep-web:${{ github.sha }}
          docker tag $REGISTRY/nextstep-web:${{ github.sha }} $REGISTRY/nextstep-web:latest
          docker push $REGISTRY/nextstep-web:latest

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build-mlflow, build-backend, build-frontend]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy MLflow
        run: |
          gcloud run deploy nextstep-mlflow \
            --image "$REGISTRY/nextstep-mlflow:latest" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --set-env-vars "MLFLOW_BUCKET=${{ secrets.GCS_BUCKET }}" \
            --quiet
          echo "✅ MLflow deployed"

      - name: Get MLflow URL
        id: mlflow
        run: |
          URL=$(gcloud run services describe nextstep-mlflow \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "MLflow URL: $URL"

      - name: Deploy Backend
        run: |
          gcloud run deploy nextstep-api \
            --image "$REGISTRY/nextstep-api:${{ github.sha }}" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "MLFLOW_TRACKING_URI=${{ steps.mlflow.outputs.url }},GIT_PYTHON_REFRESH=quiet,GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},GCS_BUCKET=${{ secrets.GCS_BUCKET }},DATA_PATH=gs://${{ secrets.GCS_BUCKET }}/raw/BASE DE DADOS PEDE 2022-2024 - DATATHON.xlsx" \
            --quiet
          echo "✅ Backend deployed"

      - name: Get Backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe nextstep-api \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)')
          HOST=$(echo "$URL" | sed 's|https://||')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL  Host: $HOST"

      - name: Deploy Frontend
        run: |
          gcloud run deploy nextstep-web \
            --image "$REGISTRY/nextstep-web:${{ github.sha }}" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "BACKEND_URL=${{ steps.backend.outputs.url }},BACKEND_HOST=${{ steps.backend.outputs.host }}" \
            --quiet
          echo "✅ Frontend deployed"

      - name: Map custom domain
        continue-on-error: true
        run: |
          gcloud components install beta --quiet 2>/dev/null || true
          # Domain mapping was created manually; CI only verifies it exists.
          # To enable auto-create: add github-actions-sa@nextstep-fiap-project.iam.gserviceaccount.com
          # as delegated owner at https://search.google.com/search-console/users
          gcloud beta run domain-mappings describe "$FRONTEND_DOMAIN" \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='table(status.resourceRecords[].type, status.resourceRecords[].name, status.resourceRecords[].rrdata)' \
            2>/dev/null && echo "✅ Domain mapping $FRONTEND_DOMAIN exists" \
            || echo "ℹ️ Domain mapping not visible to SA (mapping may still be active)"

      - name: Smoke test
        run: |
          FRONTEND_URL=$(gcloud run services describe nextstep-web \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)')
          echo "Frontend: $FRONTEND_URL"
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            "$FRONTEND_URL" -o /dev/null && echo "✅ Frontend OK" || echo "⚠️ Smoke test inconclusive"
        continue-on-error: true
