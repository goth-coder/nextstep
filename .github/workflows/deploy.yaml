name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options: ["production", "staging"]

env:
  PROJECT_ID: nextstep-fiap-project
  REGION: us-central1
  DOMAIN: nextstep.app

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download MLflow registry artifact
        uses: actions/download-artifact@v4
        with:
          name: mlflow-registry
          path: mlruns/
        continue-on-error: true  # Allow fresh deploy without prior train artifact

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build & push backend image
        run: |
          docker build -t gcr.io/$PROJECT_ID/nextstep-api:${{ github.sha }} ./backend
          docker push gcr.io/$PROJECT_ID/nextstep-api:${{ github.sha }}

      - name: Build & push frontend image
        run: |
          docker build -t gcr.io/$PROJECT_ID/nextstep-web:${{ github.sha }} ./frontend
          docker push gcr.io/$PROJECT_ID/nextstep-web:${{ github.sha }}

      - name: Update Kubernetes manifests with new image tags
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ github.sha }}|g" k8s/*.yaml

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend-deployment.yaml  # includes ConfigMap

      - name: Deploy to GKE
        run: kubectl apply -f k8s/

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/nextstep-api \
            --namespace=nextstep --timeout=120s

      - name: Wait for web rollout
        run: |
          kubectl rollout status deployment/nextstep-web \
            --namespace=nextstep --timeout=60s

      - name: Smoke test — health endpoint
        run: |
          sleep 10
          curl -f --retry 5 --retry-delay 5 \
            https://$DOMAIN/health || exit 1

      - name: Smoke test — students endpoint
        run: |
          curl -f --retry 3 --retry-delay 5 \
            "https://$DOMAIN/api/students?limit=1" || exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back..."
          kubectl rollout undo deployment/nextstep-api --namespace=nextstep
          kubectl rollout undo deployment/nextstep-web --namespace=nextstep
